<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/brand/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="48x48"
      href="/brand/favicon-48.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/brand/favicon-180.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/brand/favicon-512.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>FUADFX | MT5 Trading Journal</title>
    <meta name="title" content="FUADFX | MT5 Trading Journal" />
    <meta
      name="description"
      content="FUADFX - a forex trading journal for serious traders."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FUADFX | MT5 Trading Journal" />
    <meta
      property="og:description"
      content="FUADFX - a forex trading journal for serious traders."
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="FUADFX | MT5 Trading Journal" />
    <meta
      property="twitter:description"
      content="FUADFX - a forex trading journal for serious traders."
    />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <meta name="theme-color" content="#0a0a0a" />
    <script>
      ;(function () {
        try {
          var m = document.cookie.match(/(?:^|; )vite-ui-theme=([^;]+)/)
          var t = m ? decodeURIComponent(m[1]) : 'dark'
          if (t !== 'dark' && t !== 'light' && t !== 'system') t = 'dark'
          var resolved =
            t === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : t
          document.documentElement.classList.add(resolved)
          document.documentElement.style.colorScheme = resolved
        } catch (_) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
