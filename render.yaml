services:
  - type: web
    name: fuadfx-api
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build:server
    startCommand: npm run start:server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
